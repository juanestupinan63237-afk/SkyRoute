<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyRoute Planner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header class="header">
  <div class="header-brand">
    <span class="header-icon">✈</span>
    <span class="header-title">SkyRoute Planner</span>
  </div>
  <div class="header-status" id="apiStatus">Conectando...</div>
</header>

<!-- ══════════ LAYOUT PRINCIPAL ══════════ -->
<div class="layout">

  <!-- ── PANEL IZQUIERDO ── -->
  <aside class="sidebar">

    <!-- Viajero activo -->
    <section class="card" id="travelerCard">
      <h3 class="card-title">👤 Viajero</h3>
      <div id="travelerInfo" class="info-empty">Sin viajero activo</div>

      <button class="btn btn-outline" id="btnNewTraveler">+ Nuevo viajero</button>

      <!-- Form crear viajero (oculto por defecto) -->
      <div id="formNewTraveler" class="form-block hidden">
        <input class="input" id="inName"    type="text"   placeholder="Nombre"/>
        <input class="input" id="inBudget"  type="number" placeholder="Presupuesto USD" min="100"/>
        <input class="input" id="inTime"    type="number" placeholder="Tiempo disponible (horas)" min="1"/>
        <select class="input" id="inOrigin"><option value="">-- Aeropuerto de origen --</option></select>
        <button class="btn btn-primary" id="btnCreateTraveler">Crear viajero</button>
      </div>
    </section>

    <!-- Opciones del aeropuerto actual -->
    <section class="card" id="optionsCard" style="display:none">
      <h3 class="card-title">🛫 Opciones en <span id="currentIata">-</span></h3>

      <div class="tabs">
        <button class="tab active" data-tab="flights">Vuelos</button>
        <button class="tab" data-tab="activities">Actividades</button>
        <button class="tab" data-tab="jobs">Trabajos</button>
      </div>

      <div id="tabFlights" class="tab-content">
        <label class="label">Criterio:</label>
        <select class="input" id="selCriterion">
          <option value="cost">Menor costo</option>
          <option value="time">Menor tiempo</option>
          <option value="distance">Menor distancia</option>
        </select>
        <label class="label">Aeronave:</label>
        <select class="input" id="selAircraft">
          <option value="Commercial Airplane">Avión Comercial</option>
          <option value="Regional Plane">Avión Regional</option>
          <option value="Propeller">Hélice</option>
        </select>
        <div id="flightsList" class="list-items"></div>
      </div>

      <div id="tabActivities" class="tab-content hidden">
        <div id="activitiesList" class="list-items"></div>
      </div>

      <div id="tabJobs" class="tab-content hidden">
        <div id="jobsList" class="list-items"></div>
        <div id="jobForm" class="form-block hidden">
          <input class="input" id="inJobHours" type="number" placeholder="Horas a trabajar" min="1"/>
          <button class="btn btn-success" id="btnConfirmJob">Confirmar trabajo</button>
        </div>
      </div>
    </section>

    <!-- Planificación de ruta -->
    <section class="card">
      <h3 class="card-title">🗺️ Calcular ruta</h3>
      <select class="input" id="routeOrigin"><option value="">Origen</option></select>
      <select class="input" id="routeDest"><option value="">Destino</option></select>
      <select class="input" id="routeCriterion">
        <option value="cost">Costo</option>
        <option value="time">Tiempo</option>
        <option value="distance">Distancia</option>
      </select>
      <label class="checkbox-label">
        <input type="checkbox" id="excludeSecondary"/> Solo hubs
      </label>
      <button class="btn btn-primary" id="btnCalcRoute">Calcular ruta</button>
      <div id="routeResult" class="result-box hidden"></div>
    </section>

    <!-- Interrupción de ruta -->
    <section class="card">
      <h3 class="card-title">⛔ Bloquear ruta</h3>
      <select class="input" id="blockOrigin"><option value="">Origen</option></select>
      <select class="input" id="blockDest"><option value="">Destino</option></select>
      <button class="btn btn-danger" id="btnBlock">Bloquear</button>
      <button class="btn btn-outline" id="btnUnblock">Desbloquear</button>
      <div id="blockResult" class="result-box hidden"></div>
    </section>

  </aside>

  <!-- ── CENTRO: GRAFO ── -->
  <main class="main-panel">
    <div class="graph-toolbar">
      <span class="toolbar-label">Red aérea</span>
      <div class="legend">
        <span class="legend-item hub">● Hub</span>
        <span class="legend-item secondary">● Secundario</span>
        <span class="legend-item blocked">● Bloqueado</span>
        <span class="legend-item active-route">— Ruta activa</span>
      </div>
      <button class="btn btn-sm btn-outline" id="btnFitGraph">Centrar</button>
    </div>

    <canvas id="graphCanvas"></canvas>

    <!-- Tooltip del aeropuerto -->
    <div id="airportTooltip" class="tooltip hidden">
      <div class="tooltip-header" id="ttHeader"></div>
      <div class="tooltip-body"   id="ttBody"></div>
    </div>

    <!-- Panel de vuelo en tránsito -->
    <div id="transitPanel" class="transit-panel hidden">
      <div class="transit-title">✈ En tránsito</div>
      <div id="transitRoute" class="transit-route"></div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div id="transitPct" class="transit-pct">0%</div>
      <div class="transit-actions">
        <button class="btn btn-sm btn-primary" id="btnTick">+30 min</button>
        <button class="btn btn-sm btn-primary" id="btnTickHour">+1 hora</button>
        <button class="btn btn-sm btn-danger"  id="btnInterrupt">⛔ Interrumpir</button>
      </div>
    </div>
  </main>

  <!-- ── PANEL DERECHO: LOG + REPORTE ── -->
  <aside class="log-panel">
    <div class="log-header">
      <span>📋 Actividad</span>
      <button class="btn btn-sm btn-outline" id="btnReport">Ver reporte</button>
    </div>
    <div id="logList" class="log-list"></div>

    <!-- Modal reporte -->
    <div id="reportModal" class="modal hidden">
      <div class="modal-box">
        <button class="modal-close" id="btnCloseReport">✕</button>
        <h2 class="modal-title">📊 Reporte final</h2>
        <div id="reportContent"></div>
      </div>
    </div>
  </aside>

</div>

<script src="{{ url_for('static', filename='graph.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
